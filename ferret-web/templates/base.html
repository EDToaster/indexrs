<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ferret{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        (function(){var t=localStorage.getItem("theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t)})();
    </script>
</head>
<body>
    <header class="header">
        <h1>ferret</h1>
        <div class="header-spacer"></div>
        <button class="theme-slider" id="theme-toggle" type="button" title="Toggle theme" aria-label="Toggle theme">
            <span class="theme-slider-knob">
                <span class="theme-icon-sun" aria-hidden="true">&#9788;</span>
                <span class="theme-icon-moon" aria-hidden="true">&#9790;</span>
            </span>
        </button>
        {% block header_right %}{% endblock %}
    </header>

    <div class="layout">
        {% block sidebar %}{% endblock %}
        <div class="main">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="/static/htmx.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
