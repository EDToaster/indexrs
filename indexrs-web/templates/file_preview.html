<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ path }} - indexrs</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        (function(){var t=localStorage.getItem("theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t)})();
    </script>
</head>
<body>
    <header class="header">
        <h1>indexrs</h1>
        <div class="header-spacer"></div>
        <button class="theme-toggle" id="theme-toggle" type="button" title="Toggle theme">
            <span class="theme-icon-sun" aria-hidden="true">&#9788;</span>
            <span class="theme-icon-moon" aria-hidden="true">&#9790;</span>
        </button>
    </header>

    <a href="/" class="back-link">&larr; Back to search</a>

    <div class="file-preview-header">
        <h2>{{ path }}</h2>
        <div class="file-preview-meta">
            {{ language }} &middot; {{ total_lines }} line{% if total_lines != 1 %}s{% endif %}
            <button type="button" class="outline-toggle" id="outline-toggle" title="Toggle symbol outline">&#9776; Symbols</button>
        </div>
    </div>

    <div class="file-preview-layout">
        <div class="outline-panel" id="outline-panel"
             hx-get="/symbol-outline?repo={{ repo }}&amp;path={{ path }}"
             hx-trigger="load"
             hx-swap="innerHTML">
            <div class="outline-loading"><span class="spinner"></span></div>
        </div>
        <div class="code-lines">
        {% for line in &lines %}
            <div class="code-line" id="L{{ line.0 }}">
                <span class="line-number">{{ line.0 }}</span>
                <span class="line-content">{{ line.1 }}</span>
            </div>
        {% endfor %}
        </div>
    </div>

    <script src="/static/htmx.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
